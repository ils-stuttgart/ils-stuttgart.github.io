<footer class="site-footer">
  <div class="wrapper">
    <div class="footer-links">
    <b>ILS</b>: 
      {% if site.email %}
        <a href="mailto:{{ site.email }}" class="footer-link">
          📧 {{ site.email }}
        </a>
      {% endif %}

      {% if site.github_username %}
        <a href="https://github.com/{{ site.github_username }}"
           target="_blank" rel="noopener"
           class="footer-link">
          🐙 GitHub
        </a>
      {% endif %}

      {% if site.linkedin_url %}
        <a href="{{ site.linkedin_url }}"
           target="_blank" rel="noopener"
           class="footer-link linkedin">
          <svg xmlns="http://www.w3.org/2000/svg"
               viewBox="0 0 24 24"
               width="16" height="16"
               aria-hidden="true">
            <path fill="currentColor"
              d="M20.45 20.45h-3.56v-5.57c0-1.33-.03-3.05-1.86-3.05-1.86 0-2.14 1.45-2.14 2.95v5.67H9.33V9h3.42v1.56h.05c.48-.9 1.66-1.86 3.41-1.86 3.65 0 4.33 2.4 4.33 5.52v6.23zM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12zM7.12 20.45H3.56V9h3.56v11.45zM22.23 0H1.77C.79 0 0 .78 0 1.74v20.52C0 23.22.79 24 1.77 24h20.46c.98 0 1.77-.78 1.77-1.74V1.74C24 .78 23.21 0 22.23 0z"/>
          </svg>
          LinkedIn
        </a>
      {% endif %}

    </div>
  </div>
</footer>
